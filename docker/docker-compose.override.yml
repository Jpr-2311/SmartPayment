# Docker Compose Override - Development
# Hot-reload mounts for local development

services:
  finpilot-backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ../backend:/src
    # Use dotnet watch for hot reload in development
    command: ["dotnet", "watch", "run", "--project", "src/FinPilot.API"]

  finpilot-frontend:
    environment:
      NODE_ENV: development
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]
